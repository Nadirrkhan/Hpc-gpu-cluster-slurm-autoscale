ClusterName=gpu_cluster
ControlMachine=controller
ControlAddr=192.168.1.10
SlurmUser=slurm
AuthType=auth/munge
StateSaveLocation=/cluster/slurm/state
SlurmdSpoolDir=/var/spool/slurmd
ProctrackType=proctrack/linuxproc
TaskPlugin=task/cgroup
SelectType=select/cons_tres
SelectTypeParameters=CR_Core_Memory
ReturnToService=1
GresTypes=gpu

# --- NODE DEFINITIONS ---
# node01: 12 CPUs, 15GB RAM, 1 GPU (Address: 192.168.1.73)
NodeName=node01 NodeAddr=192.168.1.73 CPUs=12 Boards=1 SocketsPerBoard=1 CoresPerSocket=6 ThreadsPerCore=2 RealMemory=15000 Gres=gpu:1
# node02: 12 CPUs, 31GB RAM, 1 GPU (Address: 192.168.1.74)
NodeName=node02 NodeAddr=192.168.1.74 CPUs=12 Boards=1 SocketsPerBoard=1 CoresPerSocket=6 ThreadsPerCore=2 RealMemory=31000 Gres=gpu:1

# --- PARTITION & SCHEDULING ---
DebugFlags=NO_CONF_HASH

# --- POWER MANAGEMENT AUTOMATION (OPTIMIZED) ---
# External scripts for Node Wake-on-LAN and Shutdown
SuspendProgram=/cluster/slurm/scripts/suspend.sh
ResumeProgram=/cluster/slurm/scripts/resume.sh

# Idle time before suspension (Set to 10 hours / 36000 seconds for stability)
SuspendTime=36000

# Timeouts for boot-up and shutdown processes (300 seconds each)
ResumeTimeout=300
SuspendTimeout=300

# Wait time for slow-booting nodes before job failure
BatchStartTimeout=120

# Unlimited rate (0) to allow all nodes to wake/sleep simultaneously
ResumeRate=0
SuspendRate=0

# --- ACCOUNTING & DATABASE (ANSIBLE MANAGED) ---
JobAcctGatherFrequency=30
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=localhost
AccountingStoragePort=6819
AccountingStorageUser=slurm

# --- SCHEDULER & PRIORITY CONFIGURATION ---
SchedulerType=sched/backfill
JobAcctGatherType=jobacct_gather/linux
# Preemption logic: Priority given to VIP QOS over standard jobs
SchedulerParameters=preempt_strict_order,preempt_youngest_first
PreemptType=preempt/qos

# Partition: OverSubscribe enabled to allow GANG scheduling/preemption
PartitionName=gpu_part Nodes=node[01-02] Default=YES MaxTime=INFINITE State=UP OverSubscribe=FORCE:1 PriorityTier=1000

# Preemption Mode: Suspends low-priority jobs to let VIP jobs through
PreemptMode=SUSPEND,GANG

# Multifactor Priority: Heavily weights the QOS for Manager access
PriorityType=priority/multifactor
PriorityWeightQOS=1000000
PriorityDecayHalfLife=14-0

SlurmctldLogFile=/var/log/slurm/slurmctld.log
