global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gpu_metrics'
    static_configs:
      - targets: ['192.168.1.73:9445', '192.168.1.74:9445']

  - job_name: 'node_metrics'
    static_configs:
      - targets: ['192.168.1.73:9100', '192.168.1.74:9100', '192.168.1.75:9100', 'localhost:9100']

  - job_name: 'slurm_metrics'
    static_configs:
      - targets: ['localhost:9323']
